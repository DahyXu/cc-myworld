<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>我的世界 - 网页版</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; }
  canvas { display: block; }
  /* 十字准星 */
  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 20px; height: 20px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.85);
    mix-blend-mode: difference;
  }
  #crosshair::before { left: 9px; top: 0; width: 2px; height: 20px; }
  #crosshair::after { left: 0; top: 9px; width: 20px; height: 2px; }
  /* 快捷栏 */
  #hotbar {
    position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 10; pointer-events: none;
  }
  .slot {
    width: 48px; height: 48px; position: relative;
    background: rgba(0,0,0,0.45); border: 2px solid #888; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .slot.selected { border-color: #fff; box-shadow: 0 0 6px #fff; }
  .slot canvas { width: 36px; height: 36px; image-rendering: pixelated; }
  .slot span {
    position: absolute; left: 3px; top: 1px; color: #fff;
    font: 11px/1 sans-serif; text-shadow: 1px 1px 0 #000;
  }
  /* 在线人数 */
  #online {
    position: fixed; right: 10px; top: 8px; z-index: 10; color: #fff;
    font: 13px sans-serif; text-shadow: 1px 1px 0 #000; pointer-events: none;
  }
  /* 开始/暂停/连接遮罩 */
  #overlay {
    position: fixed; inset: 0; z-index: 20; display: flex;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); cursor: pointer;
  }
  #overlay .panel {
    background: rgba(20,20,20,0.92); color: #eee; padding: 28px 40px;
    border-radius: 10px; font-family: sans-serif; text-align: center;
    border: 1px solid #555; max-width: 420px;
  }
  #overlay h1 { margin: 0 0 14px; font-size: 26px; color: #7ec850; }
  #overlay p { margin: 6px 0; font-size: 14px; line-height: 1.7; }
  #overlay .go { margin-top: 16px; font-size: 16px; color: #ffd24a; }
  #ovName input {
    font: 16px sans-serif; padding: 6px 10px; border-radius: 4px;
    border: 1px solid #666; background: #222; color: #eee; width: 180px; text-align: center;
  }
  #ovName button {
    font: 15px sans-serif; margin-left: 8px; padding: 7px 16px; border-radius: 4px;
    border: 1px solid #7ec850; background: #2c4a1e; color: #cdf0b0; cursor: pointer;
  }
  #ovName button:hover { background: #3a6128; }
  kbd {
    background: #333; border: 1px solid #666; border-bottom-width: 2px;
    border-radius: 3px; padding: 1px 6px; font-size: 12px;
  }
  /* 战斗 HUD */
  #hud {
    position: fixed; left: 12px; bottom: 12px; z-index: 10; pointer-events: none;
    font-family: sans-serif;
  }
  #hpBar {
    width: 220px; height: 18px; background: rgba(0,0,0,0.5);
    border: 2px solid #888; border-radius: 4px; overflow: hidden; position: relative;
  }
  #hpFill { height: 100%; width: 100%; background: #d43b3b; transition: width 0.15s; }
  #hpText {
    position: absolute; inset: 0; color: #fff; font: bold 12px/18px sans-serif;
    text-align: center; text-shadow: 1px 1px 0 #000;
  }
  #redflash {
    position: fixed; inset: 0; z-index: 15; pointer-events: none; opacity: 0;
    transition: opacity 0.25s; background: radial-gradient(ellipse at center, rgba(255,0,0,0) 55%, rgba(255,0,0,0.55) 100%);
  }
  #floaters { position: fixed; inset: 0; z-index: 12; pointer-events: none; overflow: hidden; }
  .floater {
    position: absolute; transform: translate(-50%, -100%);
    font: bold 16px sans-serif; text-shadow: 1px 1px 0 #000; white-space: nowrap;
  }
  #deathOverlay {
    position: fixed; inset: 0; z-index: 25; display: none;
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(40,0,0,0.75); color: #ff6b6b;
    font: bold 42px sans-serif; text-shadow: 2px 2px 0 #000;
  }
  #deathOverlay small { font-size: 16px; color: #ddd; margin-top: 12px; }
  /* WebGL 不可用提示 */
  #nogl {
    position: fixed; inset: 0; z-index: 30; display: none;
    align-items: center; justify-content: center; color: #fff;
    background: #222; font: 16px sans-serif;
  }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="hotbar"></div>
<div id="online"></div>
<div id="hud"><div id="hpBar"><div id="hpFill"></div><div id="hpText">20 / 20</div></div></div>
<div id="redflash"></div>
<div id="floaters"></div>
<div id="deathOverlay">你死了<small>3 秒后在出生点复活…</small></div>
<div id="overlay">
  <div class="panel">
    <h1>我的世界 · 联机版</h1>
    <div id="ovConnecting">
      <p>正在连接服务器…</p>
    </div>
    <div id="ovName" style="display:none">
      <p>给自己起个名字（最多 12 字）</p>
      <p><input id="nameInput" maxlength="12" placeholder="昵称"><button id="nameBtn">进入世界</button></p>
    </div>
    <div id="ovStart" style="display:none">
      <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动　<kbd>空格</kbd> 跳跃　鼠标转视角</p>
      <p>左键挖方块　右键放方块</p>
      <p><kbd>1</kbd> 剑　<kbd>2</kbd> 弓　对准怪物左键攻击</p>
      <p><kbd>1</kbd>~<kbd>8</kbd> 或滚轮选择方块　<kbd>ESC</kbd> 暂停</p>
      <p class="go">点击任意处开始游戏</p>
    </div>
    <div id="ovFile" style="display:none">
      <p>联机模式无法用 file:// 直接打开。</p>
      <p>请在项目目录运行 <kbd>npx wrangler dev</kbd><br>然后访问提示的本地地址。</p>
    </div>
    <div id="ovReplaced" style="display:none">
      <p>这个世界已在另一个窗口打开。</p>
      <p>同一浏览器共用一个身份：先关闭其他窗口，<br>再刷新本页继续游戏。</p>
    </div>
  </div>
</div>
<div id="nogl">你的浏览器不支持 WebGL，无法运行游戏。请更换或升级浏览器。</div>
<script src="lib/three.min.js"></script>
<script src="js/noise.js"></script>
<script src="js/blocks.js"></script>
<script src="shared/protocol.js"></script>
<script src="shared/physics.js"></script>
<script src="shared/stats.js"></script>
<script src="shared/mobs_def.js"></script>
<script src="js/world.js"></script>
<script src="js/mesher.js"></script>
<script src="js/player.js"></script>
<script src="js/interact.js"></script>
<script src="js/combat.js"></script>
<script src="js/ui.js"></script>
<script src="js/net.js"></script>
<script src="js/entities.js"></script>
<script src="js/hud.js"></script>
<script src="js/main.js"></script>
</body>
</html>
